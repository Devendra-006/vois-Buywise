<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyWise - AI Buying Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #0f172a; color: #f1f5f9; margin: 0; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .shimmer { background: linear-gradient(90deg, rgba(56,189,248,0.05) 25%, rgba(56,189,248,0.15) 50%, rgba(56,189,248,0.05) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse { animation: pulse 1.2s ease-in-out infinite; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .badge-amazon { background: rgba(255,153,0,0.15); color: #f59e0b; border: 1px solid rgba(255,153,0,0.3); }
    .badge-flipkart { background: rgba(47,126,216,0.15); color: #60a5fa; border: 1px solid rgba(47,126,216,0.3); }
    .badge-croma { background: rgba(0,193,120,0.15); color: #34d399; border: 1px solid rgba(0,193,120,0.3); }
    .badge-reliance { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
    .badge-default { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
    .discount-badge { background: linear-gradient(135deg, #ef4444, #f97316); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const CATEGORIES = [
      { id: "all", name: "All", icon: "🏷️" },
      { id: "electronics", name: "Electronics", icon: "📱" },
      { id: "fashion", name: "Fashion", icon: "👕" },
      { id: "home", name: "Home", icon: "🏠" },
      { id: "beauty", name: "Beauty", icon: "💄" },
      { id: "sports", name: "Sports", icon: "⚽" },
    ];

    const TRENDING = ["laptop under 50k", "wireless earbuds", "running shoes", "smartphone 5G"];

    function getBadge(platform) {
      const p = (platform || "").toLowerCase();
      if (p.includes("amazon")) return "badge-amazon";
      if (p.includes("flipkart")) return "badge-flipkart";
      if (p.includes("croma")) return "badge-croma";
      if (p.includes("reliance")) return "badge-reliance";
      return "badge-default";
    }

    function Toast({ msg, type, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      const bg = { success: "bg-emerald-600", error: "bg-rose-600", info: "bg-sky-600" };
      return (
        <div className={`fixed bottom-4 right-4 ${bg[type] || bg.info} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 fade-in`}>
          <span className="text-sm">{msg}</span>
          <button onClick={onClose} className="text-white/70 hover:text-white">✕</button>
        </div>
      );
    }

    function Sidebar({ view, setView, onSearch }) {
      return (
        <aside className="w-64 bg-slate-900 border-r border-slate-700 h-screen sticky top-0 flex flex-col">
          <div className="p-4 border-b border-slate-700">
            <div className="flex items-center gap-2">
              <span className="text-2xl">🛒</span>
              <span className="font-bold text-lg text-white">BuyWise</span>
            </div>
            <p className="text-[10px] text-slate-500 mt-1">AI Buying Assistant</p>
          </div>
          <nav className="flex-1 p-3 space-y-1">
            {[
              { id: "home", icon: "🏠", label: "Home" },
              { id: "wishlist", icon: "❤️", label: "Wishlist" },
              { id: "alerts", icon: "🔔", label: "Price Alerts" },
              { id: "history", icon: "🕐", label: "History" },
              { id: "settings", icon: "⚙️", label: "Settings" },
            ].map(item => (
              <button key={item.id} onClick={() => setView(item.id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition ${view === item.id ? "bg-sky-500/20 text-sky-400 border-l-2 border-sky-400" : "text-slate-400 hover:bg-slate-800"}`}>
                <span>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </nav>
          <div className="mt-6 px-3">
            <p className="text-[10px] uppercase text-slate-500 font-semibold px-3 mb-2">Categories</p>
            <div className="space-y-1">
              {CATEGORIES.map(c => (
                <button key={c.id} onClick={() => { setView("home"); onSearch(c.name); }}
                  className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-slate-400 hover:bg-slate-800 transition">
                  <span>{c.icon}</span>
                  <span>{c.name}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="mt-6 px-3">
            <p className="text-[10px] uppercase text-slate-500 font-semibold px-3 mb-2">Trending</p>
            <div className="space-y-1">
              {TRENDING.map((t, i) => (
                <button key={i} onClick={() => { setView("home"); onSearch(t); }}
                  className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-slate-400 hover:bg-slate-800 transition">
                  <span>🔥</span>
                  <span className="truncate">{t}</span>
                </button>
              ))}
            </div>
          </div>
        </aside>
      );
    }

    function ProductCard({ product, onWish, onAlert, onSelect, showDiscount = true }) {
      const discount = product.discount || (product.original_price > product.price ? Math.round((1 - product.price / product.original_price) * 100) : 0);
      
      return (
        <div className="bg-slate-900/70 border border-slate-700 rounded-xl p-3 hover:border-sky-500/50 transition group cursor-pointer" onClick={() => onSelect && onSelect(product)}>
          <div className="flex gap-3">
            <div className="w-16 h-16 bg-slate-800 rounded-lg flex items-center justify-center flex-shrink-0">
              <span className="text-2xl">📦</span>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between gap-2">
                <h4 className="font-medium text-sm line-clamp-2 flex-1">{product.title}</h4>
                {showDiscount && discount > 0 && (
                  <span className="discount-badge flex-shrink-0">-{discount}%</span>
                )}
              </div>
              <div className="flex items-center gap-2 mt-1">
                <span className={`badge ${getBadge(product.platform)}`}>{product.platform}</span>
                <span className="text-[10px] text-slate-500">{product.brand}</span>
              </div>
              <div className="flex items-center justify-between mt-2">
                <div>
                  <span className="text-lg font-bold text-emerald-400">₹{product.price?.toLocaleString()}</span>
                  {product.original_price > product.price && (
                    <span className="text-xs text-slate-500 line-through ml-2">₹{product.original_price?.toLocaleString()}</span>
                  )}
                </div>
                <div className="flex items-center gap-2 text-xs text-slate-400">
                  <span>⭐ {product.rating || product.seller_rating || "4.0"}</span>
                  {product.reviews_count > 0 && <span>({product.reviews_count?.toLocaleString()})</span>}
                </div>
              </div>
              <div className="flex gap-2 mt-2" onClick={e => e.stopPropagation()}>
                <button onClick={() => onWish(product)} className="text-xs px-2 py-1 bg-slate-800 hover:bg-slate-700 rounded transition">❤️</button>
                <button onClick={() => onAlert(product)} className="text-xs px-2 py-1 bg-slate-800 hover:bg-slate-700 rounded transition">🔔</button>
                {product.product_url && product.product_url !== "#" && (
                  <a href={product.product_url} target="_blank" rel="noopener noreferrer" className="text-xs px-2 py-1 bg-sky-500/20 text-sky-400 hover:bg-sky-500/30 rounded transition">View</a>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ProductDetailModal({ product, onClose, onWish, onAlert, showChart = false }) {
      if (!product) return null;
      const discount = product.discount || Math.round((1 - product.price / (product.original_price || product.price)) * 100);
      
      return (
        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
          <div className="bg-slate-900 border border-slate-700 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-4 border-b border-slate-700 flex items-center justify-between">
              <h3 className="font-bold text-lg">Product Details</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-xl">×</button>
            </div>
            <div className="p-5 space-y-5">
              <div className="flex gap-4">
                <div className="w-24 h-24 bg-slate-800 rounded-xl flex items-center justify-center flex-shrink-0">
                  <span className="text-4xl">📦</span>
                </div>
                <div className="flex-1">
                  <h4 className="font-semibold text-lg">{product.title}</h4>
                  <div className="flex items-center gap-2 mt-2">
                    <span className={`badge ${getBadge(product.platform)}`}>{product.platform}</span>
                    <span className="text-sm text-slate-400">{product.brand}</span>
                  </div>
                  <div className="flex items-baseline gap-2 mt-2">
                    <span className="text-2xl font-bold text-emerald-400">₹{product.price?.toLocaleString()}</span>
                    {product.original_price > product.price && (
                      <>
                        <span className="text-slate-500 line-through">₹{product.original_price?.toLocaleString()}</span>
                        <span className="discount-badge">-{discount}%</span>
                      </>
                    )}
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-3 gap-3">
                <div className="bg-slate-800 rounded-xl p-3 text-center">
                  <p className="text-2xl font-bold text-sky-400">{product.rating || product.seller_rating || "4.0"}</p>
                  <p className="text-xs text-slate-500">Rating</p>
                </div>
                <div className="bg-slate-800 rounded-xl p-3 text-center">
                  <p className="text-2xl font-bold text-emerald-400">{product.delivery_days || 3}</p>
                  <p className="text-xs text-slate-500">Delivery (days)</p>
                </div>
                <div className="bg-slate-800 rounded-xl p-3 text-center">
                  <p className="text-2xl font-bold text-violet-400">{product.reviews_count ? (product.reviews_count / 1000).toFixed(1) + "K" : "-"}</p>
                  <p className="text-xs text-slate-500">Reviews</p>
                </div>
              </div>

              {showChart && product.historical_price && product.historical_price.length > 1 && (
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <h5 className="font-semibold text-sm mb-3 flex items-center gap-2">
                    <span>📈</span> Price Trend
                  </h5>
                  <PriceChart product={product} showHeader={false} />
                </div>
              )}

              {product.review_snippets && product.review_snippets.length > 0 && (
                <div>
                  <h5 className="font-semibold text-sm mb-3">Customer Reviews</h5>
                  <div className="space-y-2">
                    {product.review_snippets.slice(0, 3).map((r, i) => (
                      <div key={i} className="bg-slate-800/50 rounded-lg p-3 text-sm text-slate-300">
                        "{r}"
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="flex gap-3">
                <a href={product.product_url} target="_blank" rel="noopener noreferrer"
                  className="flex-1 text-center py-3 bg-gradient-to-r from-sky-500 to-blue-600 rounded-xl font-semibold hover:from-sky-400 hover:to-blue-500 transition">
                  View on {product.platform}
                </a>
                <button onClick={() => { onWish(product); onClose(); }} className="px-4 py-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition">❤️</button>
                <button onClick={() => { onAlert(product); onClose(); }} className="px-4 py-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition">🔔</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TopDealsSection({ products, onWish, onAlert, onSelect }) {
      const topDeals = useMemo(() => {
        if (!products || products.length === 0) return [];
        return [...products]
          .filter(p => (p.discount || 0) > 0)
          .sort((a, b) => {
            const discA = a.discount || Math.round((1 - a.price / (a.original_price || a.price)) * 100);
            const discB = b.discount || Math.round((1 - b.price / (b.original_price || b.price)) * 100);
            return discB - discA;
          })
          .slice(0, 4);
      }, [products]);

      if (topDeals.length === 0) return null;

      return (
        <div className="bg-gradient-to-r from-rose-900/30 to-orange-900/30 border border-rose-500/20 rounded-2xl p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-2xl">🔥</span>
            <h3 className="text-lg font-bold">Top Deals - Biggest Discounts</h3>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {topDeals.map((p, i) => (
              <ProductCard key={p.id} product={p} onWish={onWish} onAlert={onAlert} onSelect={onSelect} />
            ))}
          </div>
        </div>
      );
    }

    function TopRatedSection({ products, onWish, onAlert, onSelect }) {
      const topRated = useMemo(() => {
        if (!products || products.length === 0) return [];
        return [...products]
          .filter(p => (p.rating || p.seller_rating || 0) >= 4.0)
          .sort((a, b) => (b.rating || b.seller_rating || 0) - (a.rating || a.seller_rating || 0))
          .slice(0, 4);
      }, [products]);

      if (topRated.length === 0) return null;

      return (
        <div className="bg-gradient-to-r from-violet-900/30 to-purple-900/30 border border-violet-500/20 rounded-2xl p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-2xl">⭐</span>
            <h3 className="text-lg font-bold">Top Rated Products</h3>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {topRated.map(p => (
              <ProductCard key={p.id} product={p} onWish={onWish} onAlert={onAlert} onSelect={onSelect} />
            ))}
          </div>
        </div>
      );
    }

    function MostReviewedSection({ products, onWish, onAlert, onSelect }) {
      const mostReviewed = useMemo(() => {
        if (!products || products.length === 0) return [];
        return [...products]
          .filter(p => (p.reviews_count || 0) > 0)
          .sort((a, b) => (b.reviews_count || 0) - (a.reviews_count || 0))
          .slice(0, 4);
      }, [products]);

      if (mostReviewed.length === 0) return null;

      return (
        <div className="bg-gradient-to-r from-sky-900/30 to-blue-900/30 border border-sky-500/20 rounded-2xl p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-2xl">💬</span>
            <h3 className="text-lg font-bold">Most Reviewed</h3>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {mostReviewed.map(p => (
              <ProductCard key={p.id} product={p} onWish={onWish} onAlert={onAlert} onSelect={onSelect} />
            ))}
          </div>
        </div>
      );
    }

    function TopCard({ emoji, title, item, color, onWish }) {
      if (!item) return null;
      const bc = { gold: "border-amber-500/40", green: "border-emerald-500/40", purple: "border-violet-500/40" };
      const gr = { gold: "from-amber-500/10", green: "from-emerald-500/10", purple: "from-violet-500/10" };
      const discount = item.discount || (item.original_price > item.price ? Math.round((1 - item.price / item.original_price) * 100) : 0);
      
      return (
        <div className={`bg-gradient-to-b ${gr[color]} bg-slate-900/70 border ${bc[color]} rounded-2xl p-4 space-y-3`}>
          <div className="flex justify-between items-start">
            <div className="flex items-center gap-2">
              <span className="text-2xl">{emoji}</span>
              <div>
                <p className="text-[10px] uppercase text-slate-500 font-semibold">{title}</p>
                <p className="text-sm font-semibold line-clamp-1">{item.title}</p>
              </div>
            </div>
            <div className="text-right">
              {discount > 0 && <span className="discount-badge block mb-1">-{discount}%</span>}
              <p className="text-[10px] uppercase text-slate-500">Score</p>
              <p className="text-xl font-bold text-sky-400">{item.smart_score}</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <span className={`badge ${getBadge(item.platform)}`}>{item.platform}</span>
            <button onClick={() => onWish(item)} className="text-rose-400 hover:text-rose-300">❤️</button>
            {item.product_url && item.product_url !== "#" && (
              <a href={item.product_url} target="_blank" rel="noopener noreferrer" className="ml-auto text-xs text-sky-400 hover:text-sky-300">View →</a>
            )}
          </div>
          {item.why_selected?.slice(0, 2).map((r, i) => (
            <p key={i} className="text-xs text-slate-300 flex items-start">
              <span className="text-sky-400 mr-1.5">✓</span>{r}
            </p>
          ))}
          <div className="flex justify-between text-xs text-slate-500 border-t border-slate-700 pt-2">
            <span className="font-semibold text-slate-200">₹{item.price?.toLocaleString()}</span>
            <span>⭐ {item.seller_rating}</span>
            <span>🚚 {item.delivery_days}d</span>
          </div>
        </div>
      );
    }

    function PriceChart({ product, showHeader = true }) {
      const ref = useRef(null);
      const chart = useRef(null);
      useEffect(() => {
        if (!product?.historical_price) return;
        if (chart.current) chart.current.destroy();
        chart.current = new Chart(ref.current, {
          type: "line",
          data: {
            labels: product.historical_price.map((_, i) => `T${product.historical_price.length - i}`),
            datasets: [{ label: "Price", data: product.historical_price, borderColor: "#38bdf8", backgroundColor: "rgba(56,189,248,0.1)", tension: 0.4, fill: true }]
          },
          options: { responsive: true, plugins: { legend: { labels: { color: "#e5e7eb" } } }, scales: { x: { ticks: { color: "#9ca3af" } }, y: { ticks: { color: "#9ca3af", callback: v => "₹" + v } } } }
        });
        return () => chart.current?.destroy();
      }, [product]);
      if (!product) return null;
      return (
        <div>
          {showHeader && <p className="text-xs text-slate-500 mb-2 line-clamp-1">{product.title}</p>}
          <canvas ref={ref} height="180"></canvas>
        </div>
      );
    }

    function ProgressBar({ show }) {
      const [step, setStep] = useState(0);
      const steps = ["Searching", "Retrieving", "Analyzing", "Pricing", "Scoring", "Selecting", "Explaining"];
      useEffect(() => {
        if (!show) { setStep(0); return; }
        const t = setInterval(() => setStep(s => s < 6 ? s + 1 : s), 1200);
        return () => clearInterval(t);
      }, [show]);
      if (!show) return null;
      return (
        <div className="bg-slate-900/70 border border-slate-700 rounded-2xl p-5 fade-in">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-2 h-2 rounded-full bg-sky-400 pulse"></div>
            <span className="text-xs uppercase text-sky-400 font-semibold tracking-widest">Agent Pipeline Active</span>
          </div>
          <div className="grid grid-cols-7 gap-2">
            {steps.map((s, i) => (
              <div key={i} className={`flex flex-col items-center text-center gap-1.5 p-2 rounded-xl transition-all duration-500 ${i < step ? "opacity-40" : ""} ${i === step ? "bg-sky-500/10 border border-sky-500/30 shimmer" : ""} ${i > step ? "opacity-20" : ""}`}>
                <span className="text-xl">{["🌐", "📦", "💬", "💰", "⚖️", "🎯", "🧾"][i]}</span>
                <span className="text-[10px] text-slate-400 leading-tight">{s}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ComparisonTable({ products, selId, setSelId, onSetAlert, viewGraph }) {
      const [sortBy, setSortBy] = useState("smart_score");
      const [sortDir, setSortDir] = useState("desc");

      const sorted = useMemo(() => {
        if (!products) return [];
        return [...products].sort((a, b) => {
          let va, vb;
          switch (sortBy) {
            case "price": va = a.price; vb = b.price; break;
            case "rating": va = a.rating || a.seller_rating || 0; vb = b.rating || b.seller_rating || 0; break;
            case "discount": 
              va = a.discount || Math.round((1 - a.price / (a.original_price || a.price)) * 100);
              vb = b.discount || Math.round((1 - b.price / (b.original_price || b.price)) * 100);
              break;
            case "reviews": va = a.reviews_count || 0; vb = b.reviews_count || 0; break;
            default: va = a.smart_score; vb = b.smart_score;
          }
          return sortDir === "asc" ? va - vb : vb - va;
        });
      }, [products, sortBy, sortDir]);

      const handleSort = (field) => {
        if (sortBy === field) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortBy(field); setSortDir("desc"); }
      };

      return (
        <div className="bg-slate-900/70 border border-slate-700 rounded-2xl overflow-hidden">
          <div className="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
            <span className="text-xs uppercase text-slate-400 font-semibold">📊 All Products ({sorted.length})</span>
            <button onClick={() => selId && onSetAlert(sorted.find(p => p.id === selId))} className="text-xs text-sky-400 hover:text-sky-300">Set Alert</button>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead className="bg-slate-800 border-b border-slate-700">
                <tr className="text-slate-500 uppercase text-[10px]">
                  <th className="px-3 py-2.5 text-left">#</th>
                  <th className="px-3 py-2.5 text-left">Product</th>
                  <th className="px-3 py-2.5 text-left">Platform</th>
                  <th className="px-3 py-2.5 text-right cursor-pointer hover:text-sky-400" onClick={() => handleSort("price")}>
                    Price {sortBy === "price" && (sortDir === "asc" ? "↑" : "↓")}
                  </th>
                  <th className="px-3 py-2.5 text-right cursor-pointer hover:text-sky-400" onClick={() => handleSort("discount")}>
                    Discount {sortBy === "discount" && (sortDir === "asc" ? "↑" : "↓")}
                  </th>
                  <th className="px-3 py-2.5 text-right cursor-pointer hover:text-sky-400" onClick={() => handleSort("rating")}>
                    Rating {sortBy === "rating" && (sortDir === "asc" ? "↑" : "↓")}
                  </th>
                  <th className="px-3 py-2.5 text-right cursor-pointer hover:text-sky-400" onClick={() => handleSort("reviews")}>
                    Reviews {sortBy === "reviews" && (sortDir === "asc" ? "↑" : "↓")}
                  </th>
                  <th className="px-3 py-2.5 text-right cursor-pointer hover:text-sky-400" onClick={() => handleSort("smart_score")}>
                    Score {sortBy === "smart_score" && (sortDir === "asc" ? "↑" : "↓")}
                  </th>
                  <th className="px-3 py-2.5 text-center">Graph</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((p, i) => {
                  const discount = p.discount || Math.round((1 - p.price / (p.original_price || p.price)) * 100);
                  return (
                    <tr key={p.id} onClick={() => setSelId(p.id)}
                      className={`border-b border-slate-800/50 cursor-pointer hover:bg-sky-500/5 transition ${p.id === selId ? "bg-sky-500/10 border-l-2 border-l-sky-400" : ""}`}>
                      <td className="px-3 py-2.5 text-slate-500 font-mono">{i + 1}</td>
                      <td className="px-3 py-2.5">
                        <p className="font-medium text-sm line-clamp-1">{p.title}</p>
                        <p className="text-[10px] text-slate-500">{p.warranty}</p>
                      </td>
                      <td className="px-3 py-2.5"><span className={`badge ${getBadge(p.platform)}`}>{p.platform}</span></td>
                      <td className="px-3 py-2.5 text-right font-semibold">₹{p.price?.toLocaleString()}</td>
                      <td className="px-3 py-2.5 text-right">
                        {discount > 0 ? <span className="discount-badge">-{discount}%</span> : <span className="text-slate-500">-</span>}
                      </td>
                      <td className="px-3 py-2.5 text-right">⭐ {p.rating || p.seller_rating || "4.0"}</td>
                      <td className="px-3 py-2.5 text-right text-slate-500">{p.reviews_count ? p.reviews_count.toLocaleString() : "-"}</td>
                      <td className="px-3 py-2.5 text-right font-bold text-sky-400">{p.smart_score}</td>
                      <td className="px-3 py-2.5 text-center">
                        <button onClick={(e) => { e.stopPropagation(); viewGraph(p.id); }} className="text-sky-400 hover:text-sky-300 text-lg" title="View Price Graph">📈</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("home");
      const [q, setQ] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [data, setData] = useState(null);
      const [selId, setSelId] = useState(null);
      const [showChart, setShowChart] = useState(false);
      const viewGraph = (id) => { setSelId(id); setShowChart(true); };
      const closeModal = () => { setSelId(null); setShowChart(false); };
      const [wish, setWish] = useState([]);
      const [alerts, setAlerts] = useState([]);
      const [history, setHistory] = useState([]);
      const [toast, setToast] = useState(null);
      const [showFilters, setShowFilters] = useState(false);
      const [cat, setCat] = useState("all");
      const [plat, setPlat] = useState([]);
      const [priceMin, setPriceMin] = useState("");
      const [priceMax, setPriceMax] = useState("");

      const showToast = (msg, type) => setToast({ msg, type });

      const search = async (e) => {
        if (e) e.preventDefault();
        if (!q.trim()) return;
        setLoading(true);
        setError(null);
        setData(null);
        setHistory(h => [{ q, t: new Date().toLocaleDateString() }, ...h.filter(x => x.q !== q).slice(0, 9)]);
        try {
          const res = await fetch("/api/recommendations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q })
          });
          if (!res.ok) throw new Error("Request failed");
          const json = await res.json();
          setData(json);
          if (json.products?.length) setSelId(json.products[0].id);
        } catch (err) {
          setError("Something went wrong. Please try again.");
          showToast("Search failed", "error");
        } finally {
          setLoading(false);
        }
      };

      const addWish = (item) => {
        if (!wish.find(w => w.id === item.id)) {
          setWish(w => [...w, item]);
          showToast("Added to wishlist!", "success");
        } else {
          showToast("Already in wishlist", "info");
        }
      };

      const addAlert = (item) => {
        setAlerts(a => [...a, { ...item, target: item.price, status: "Active" }]);
        showToast("Price alert set!", "success");
      };

      const sel = data?.products?.find(p => p.id === selId);
      const platforms = data?.products ? [...new Set(data.products.map(p => p.platform))] : [];

      return (
        <div className="flex min-h-screen">
          <Sidebar view={view} setView={setView} onSearch={setQ} />

          <main className="flex-1 p-6 overflow-y-auto">
            {toast && <Toast {...toast} onClose={() => setToast(null)} />}

            {view === "home" && (
              <div className="max-w-6xl mx-auto space-y-6 fade-in">
                <header className="text-center py-8">
                  <h1 className="text-5xl font-bold bg-gradient-to-r from-sky-300 via-blue-400 to-violet-400 bg-clip-text text-transparent">BuyWise</h1>
                  <p className="text-slate-400 mt-2">Find your perfect product with AI-powered recommendations</p>
                </header>

                <form onSubmit={search} className="bg-slate-900/70 border border-slate-700 rounded-2xl p-5 space-y-4">
                  <div className="flex gap-3">
                    <div className="flex-1 relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
                      <input type="text" value={q} onChange={e => setQ(e.target.value)}
                        placeholder="What are you looking for? (e.g. laptop under 50k)"
                        className="w-full pl-11 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 placeholder:text-slate-500" />
                      {q && <button type="button" onClick={() => setQ("")} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white">✕</button>}
                    </div>
                    <button type="button" onClick={() => setShowFilters(f => !f)} className={`px-4 py-2 rounded-xl border text-sm transition ${showFilters ? "bg-sky-500/20 border-sky-500 text-sky-400" : "bg-slate-800 border-slate-700 text-slate-400"}`}>Filters</button>
                    <button type="submit" disabled={loading} className="px-6 py-2.5 bg-gradient-to-r from-sky-500 to-blue-600 rounded-xl text-sm font-semibold hover:from-sky-400 hover:to-blue-500 disabled:opacity-50 transition shadow-lg shadow-sky-500/20">
                      {loading ? "Searching..." : "Search"}
                    </button>
                  </div>

                  {showFilters && (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 pt-4 border-t border-slate-700">
                      <div>
                        <label className="text-xs text-slate-500 uppercase mb-1 block">Category</label>
                        <select value={cat} onChange={e => setCat(e.target.value)} className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm">
                          {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs text-slate-500 uppercase mb-1 block">Platform</label>
                        <div className="flex flex-wrap gap-2">
                          {["Amazon", "Flipkart", "Croma", "Reliance"].map(p => (
                            <button key={p} type="button" onClick={() => setPlat(pl => pl.includes(p) ? pl.filter(x => x !== p) : [...pl, p])}
                              className={`px-3 py-1 rounded-lg text-xs border transition ${plat.includes(p) ? "bg-sky-500/20 border-sky-500 text-sky-400" : "bg-slate-800 border-slate-700 text-slate-400"}`}>
                              {p}
                            </button>
                          ))}
                        </div>
                      </div>
                      <div className="flex gap-3">
                        <div className="flex-1">
                          <label className="text-xs text-slate-500 uppercase mb-1 block">Min ₹</label>
                          <input type="number" value={priceMin} onChange={e => setPriceMin(e.target.value)} placeholder="0" className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm" />
                        </div>
                        <div className="flex-1">
                          <label className="text-xs text-slate-500 uppercase mb-1 block">Max ₹</label>
                          <input type="number" value={priceMax} onChange={e => setPriceMax(e.target.value)} placeholder="100000" className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm" />
                        </div>
                      </div>
                    </div>
                  )}
                </form>

                <ProgressBar show={loading} />

                {error && <div className="bg-rose-900/40 border border-rose-700 text-rose-200 text-sm rounded-xl px-4 py-3">⚠️ {error}</div>}

                {data && (
                  <section className="space-y-5 fade-in">
                    {platforms.length > 0 && (
                      <div className="flex items-center gap-3 flex-wrap">
                        <span className="text-xs uppercase text-slate-500 font-semibold">Sources:</span>
                        {platforms.map(p => <span key={p} className={`badge ${getBadge(p)}`}>{p}</span>)}
                        <span className="text-xs text-slate-500">{data.products?.length} products</span>
                      </div>
                    )}

                    <TopDealsSection products={data.products} onWish={addWish} onAlert={addAlert} />
                    <TopRatedSection products={data.products} onWish={addWish} onAlert={addAlert} />
                    <MostReviewedSection products={data.products} onWish={addWish} onAlert={addAlert} />

                    <div className="grid md:grid-cols-3 gap-4">
                      <TopCard emoji="🥇" title="Best Overall" item={data.topPicks?.best_overall} color="gold" onWish={addWish} />
                      <TopCard emoji="💰" title="Best Budget" item={data.topPicks?.best_budget} color="green" onWish={addWish} />
                      <TopCard emoji="⭐" title="Premium Pick" item={data.topPicks?.premium_pick} color="purple" onWish={addWish} />
                    </div>

                    <ComparisonTable products={data.products} selId={selId} setSelId={setSelId} onSetAlert={addAlert} viewGraph={viewGraph} />
                  </section>
                )}
                
                {sel && (
                  <ProductDetailModal product={sel} onClose={closeModal} onWish={addWish} onAlert={addAlert} showChart={showChart} />
                )}

                {!data && !loading && (
                  <div className="text-center py-16">
                    <span className="text-6xl mb-4 block">🔍</span>
                    <h3 className="text-xl font-semibold mb-2">Start searching</h3>
                    <p className="text-slate-400">Enter a product query above to get AI-powered recommendations</p>
                  </div>
                )}
              </div>
            )}

            {view === "wishlist" && (
              <div className="max-w-4xl mx-auto fade-in">
                <h2 className="text-2xl font-bold mb-6">❤️ Wishlist ({wish.length})</h2>
                {wish.length === 0 ? (
                  <div className="text-center py-16">
                    <span className="text-6xl mb-4 block">❤️</span>
                    <p className="text-slate-400">Your wishlist is empty</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {wish.map((p, i) => <ProductCard key={i} product={p} onWish={() => setWish(w => w.filter((_, j) => j !== i))} onAlert={() => {}} showDiscount={false} />)}
                  </div>
                )}
              </div>
            )}

            {view === "alerts" && (
              <div className="max-w-3xl mx-auto fade-in">
                <h2 className="text-2xl font-bold mb-6">🔔 Price Alerts ({alerts.length})</h2>
                {alerts.length === 0 ? (
                  <div className="text-center py-16">
                    <span className="text-6xl mb-4 block">🔔</span>
                    <p className="text-slate-400">No price alerts set</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {alerts.map((a, i) => (
                      <div key={i} className="bg-slate-900/70 border border-slate-700 rounded-xl p-4 flex items-center justify-between">
                        <div>
                          <p className="font-medium">{a.title}</p>
                          <p className="text-xs text-slate-500">Target: ₹{a.target?.toLocaleString()} | Current: ₹{a.price?.toLocaleString()}</p>
                        </div>
                        <span className="px-2 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs font-semibold">{a.status}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {view === "history" && (
              <div className="max-w-3xl mx-auto fade-in">
                <h2 className="text-2xl font-bold mb-6">🕐 Search History</h2>
                {history.length === 0 ? (
                  <div className="text-center py-16">
                    <span className="text-6xl mb-4 block">🕐</span>
                    <p className="text-slate-400">No recent searches</p>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {history.map((h, i) => (
                      <button key={i} onClick={() => { setQ(h.q); setView("home"); search(); }}
                        className="w-full text-left bg-slate-900/70 border border-slate-700 rounded-xl p-3 flex items-center justify-between hover:bg-slate-800 transition">
                        <div>
                          <p className="font-medium">{h.q}</p>
                          <p className="text-xs text-slate-500">{h.t}</p>
                        </div>
                        <span className="text-sky-400">Re-run</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}

            {view === "settings" && (
              <div className="max-w-2xl fade-in">
                <h2 className="text-2xl font-bold mb-6">⚙️ Settings</h2>
                <div className="bg-slate-900/70 border border-slate-700 rounded-2xl p-5 space-y-4">
                  <div>
                    <h3 className="font-semibold mb-3">Notifications</h3>
                    <label className="flex items-center justify-between">
                      <span className="text-sm">Email notifications</span>
                      <div className="w-10 h-6 bg-sky-500 rounded-full relative"><div className="w-4 h-4 bg-white rounded-full absolute top-1 right-1"></div></div>
                    </label>
                  </div>
                </div>
              </div>
            )}

            <footer className="text-center py-8 mt-12 border-t border-slate-800">
              <p className="text-[11px] text-slate-500">BuyWise - AI Buying Assistant - Powered by 7 specialized agents</p>
            </footer>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
