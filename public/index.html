<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BuyWise – Agentic AI Buying Assistant</title>
    <meta name="description" content="Multi-agent AI buying assistant that searches across multiple e-commerce websites to find the best product for you." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', system-ui, sans-serif; }
      :root {
        --bg-primary: #020617;
        --bg-secondary: #0f172a;
        --bg-tertiary: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent-sky: #38bdf8;
        --accent-emerald: #34d399;
        --accent-amber: #fbbf24;
        --accent-violet: #a78bfa;
        --accent-rose: #fb7185;
        --border-color: rgba(148, 163, 184, 0.2);
      }
      .light-mode {
        --bg-primary: #f8fafc;
        --bg-secondary: #f1f5f9;
        --bg-tertiary: #e2e8f0;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: rgba(71, 85, 105, 0.2);
      }
      body { background: var(--bg-primary); color: var(--text-primary); }
      .bg-primary { background: var(--bg-primary); }
      .bg-secondary { background: var(--bg-secondary); }
      .bg-tertiary { background: var(--bg-tertiary); }
      .text-primary { color: var(--text-primary); }
      .text-secondary { color: var(--text-secondary); }
      .text-muted { color: var(--text-muted); }
      .border-custom { border-color: var(--border-color); }
      .accent-sky { color: var(--accent-sky); }
      .accent-emerald { color: var(--accent-emerald); }
      .accent-amber { color: var(--accent-amber); }
      .accent-violet { color: var(--accent-violet); }
      .accent-rose { color: var(--accent-rose); }
      .bg-accent-sky { background: var(--accent-sky); }
      .bg-accent-emerald { background: var(--accent-emerald); }
      .bg-accent-amber { background: var(--accent-amber); }
      .bg-accent-violet { background: var(--accent-violet); }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, rgba(56,189,248,0.05) 25%, rgba(56,189,248,0.15) 50%, rgba(56,189,248,0.05) 75%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fadeIn 0.5s ease-out forwards; }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .slide-in { animation: slideIn 0.3s ease-out forwards; }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
      @keyframes toastSlide {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      .toast-slide { animation: toastSlide 0.3s ease-out forwards; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .spin { animation: spin 1s linear infinite; }
      @keyframes skeleton-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      .skeleton { animation: skeleton-pulse 1.5s ease-in-out infinite; }
      .platform-badge {
        display: inline-flex; align-items: center; padding: 2px 8px;
        border-radius: 9999px; font-size: 10px; font-weight: 600;
        letter-spacing: 0.025em; text-transform: uppercase;
      }
      .platform-amazon { background: rgba(255,153,0,0.15); color: #f59e0b; border: 1px solid rgba(255,153,0,0.3); }
      .platform-flipkart { background: rgba(47,126,216,0.15); color: #60a5fa; border: 1px solid rgba(47,126,216,0.3); }
      .platform-croma { background: rgba(0,193,120,0.15); color: #34d399; border: 1px solid rgba(0,193,120,0.3); }
      .platform-reliance { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
      .platform-myntra { background: rgba(236,72,153,0.15); color: #f472b6; border: 1px solid rgba(236,72,153,0.3); }
      .platform-default { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .nav-item { transition: all 0.2s ease; }
      .nav-item:hover { background: var(--bg-tertiary); }
      .nav-item.active { background: rgba(56, 189, 248, 0.1); border-left: 2px solid var(--accent-sky); }
      input[type="range"] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--bg-tertiary); }
      input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent-sky); cursor: pointer; }
      .circular-progress { transform: rotate(-90deg); }
      .sort-icon { transition: transform 0.2s; }
      .sort-asc .sort-icon { transform: rotate(180deg); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback, useMemo } = React;

      const CATEGORIES = [
        { id: "all", name: "All Categories", icon: "🏷️" },
        { id: "electronics", name: "Electronics", icon: "📱" },
        { id: "fashion", name: "Fashion", icon: "👕" },
        { id: "home", name: "Home & Kitchen", icon: "🏠" },
        { id: "beauty", name: "Beauty", icon: "💄" },
        { id: "sports", name: "Sports", icon: "⚽" },
        { id: "books", name: "Books", icon: "📚" },
      ];

      const PLATFORMS = ["Amazon", "Flipkart", "Croma", "Reliance Digital", "Myntra", "Ajio", "Nykaa"];
      
      const TRENDING_SEARCHES = [
        "laptop under 50k", "wireless earbuds", "running shoes", 
        "smartphone 5G", "winter jackets", "pressure cooker"
      ];

      const AUTOCOMPLETE_SUGGESTIONS = [
        "best laptop under 50000", "wireless earbuds under 2000", "smartphone 5g under 30000",
        "4k tv under 50000", "running shoes for men", "winter jacket women",
        "laptop for students", "headphones noise cancellation", "smartwatch under 5000",
        "earbuds with bass", "gaming laptop under 80000", "camera for beginners"
      ];

      const BRANDS = ["Samsung", "Apple", "OnePlus", "Xiaomi", "Realme", "Vivo", "Oppo", "Sony", "LG", "TCL", "Mi", "Motorola", "Nokia", "BoAt", "JBL", "Noise", "Fire-Boltt", "Titan"];

      const useLocalStorage = (key, initialValue) => {
        const [storedValue, setStoredValue] = useState(() => {
          try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
          } catch (error) {
            console.error("Error reading localStorage:", error);
            return initialValue;
          }
        });

        const setValue = (value) => {
          try {
            const valueToStore = value instanceof Function ? value(storedValue) : value;
            setStoredValue(valueToStore);
            window.localStorage.setItem(key, JSON.stringify(valueToStore));
          } catch (error) {
            console.error("Error writing to localStorage:", error);
          }
        };

        return [storedValue, setValue];
      };

      const getPlatformClass = (platform) => {
        const p = (platform || "").toLowerCase();
        if (p.includes("amazon")) return "platform-amazon";
        if (p.includes("flipkart")) return "platform-flipkart";
        if (p.includes("croma")) return "platform-croma";
        if (p.includes("reliance")) return "platform-reliance";
        if (p.includes("myntra") || p.includes("ajio") || p.includes("nykaa")) return "platform-myntra";
        return "platform-default";
      };

      function CircularScore({ score, size = 80, strokeWidth = 6 }) {
        const radius = (size - strokeWidth) / 2;
        const circumference = radius * 2 * Math.PI;
        const offset = circumference - (score / 100) * circumference;
        const color = score >= 80 ? "#34d399" : score >= 60 ? "#fbbf24" : "#fb7185";

        return (
          <svg width={size} height={size} className="circular-progress">
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(148,163,184,0.2)" strokeWidth={strokeWidth} />
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth}
              strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" />
            <text x="50%" y="50%" textAnchor="middle" dy="0.3em" fill={color} fontSize="20" fontWeight="bold" style={{ transform: "rotate(90deg)", transformOrigin: "center" }}>
              {Math.round(score)}
            </text>
          </svg>
        );
      }

      function ScoreBreakdown({ product }) {
        if (!product?.score_breakdown) return null;
        const { price_score, reviews_score, rating_score, delivery_score } = product.score_breakdown;
        
        return (
          <div className="grid grid-cols-2 gap-3 mt-3">
            <div className="flex items-center gap-2 bg-tertiary/50 rounded-lg p-2">
              <span className="text-xs text-muted">💰</span>
              <span className="text-xs text-secondary">Price</span>
              <span className="ml-auto text-xs font-semibold accent-emerald">{price_score.toFixed(1)}</span>
            </div>
            <div className="flex items-center gap-2 bg-tertiary/50 rounded-lg p-2">
              <span className="text-xs text-muted">💬</span>
              <span className="text-xs text-secondary">Reviews</span>
              <span className="ml-auto text-xs font-semibold accent-sky">{reviews_score.toFixed(1)}</span>
            </div>
            <div className="flex items-center gap-2 bg-tertiary/50 rounded-lg p-2">
              <span className="text-xs text-muted">⭐</span>
              <span className="text-xs text-secondary">Rating</span>
              <span className="ml-auto text-xs font-semibold accent-violet">{rating_score.toFixed(1)}</span>
            </div>
            <div className="flex items-center gap-2 bg-tertiary/50 rounded-lg p-2">
              <span className="text-xs text-muted">🚚</span>
              <span className="text-xs text-secondary">Delivery</span>
              <span className="ml-auto text-xs font-semibold accent-amber">{delivery_score.toFixed(1)}</span>
            </div>
          </div>
        );
      }

      function Toast({ message, type, onClose }) {
        useEffect(() => {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }, [onClose]);

        const colors = {
          success: "bg-emerald-500/90 border-emerald-400",
          error: "bg-rose-500/90 border-rose-400",
          info: "bg-sky-500/90 border-sky-400",
          warning: "bg-amber-500/90 border-amber-400"
        };

        return (
          <div className={`toast-slide fixed bottom-20 md:bottom-4 right-4 ${colors[type]} border rounded-xl px-4 py-3 flex items-center gap-3 shadow-lg z-50`}>
            <span className="text-white text-sm">{message}</span>
            <button onClick={onClose} className="text-white/70 hover:text-white">✕</button>
          </div>
        );
      }

      function WeightSlider({ label, value, onChange, color, icon }) {
        return (
          <div className="flex flex-col space-y-1">
            <div className="flex justify-between text-xs uppercase tracking-wide text-secondary">
              <span className="flex items-center gap-1.5">
                <span>{icon}</span>
                <span>{label}</span>
              </span>
              <span className="font-mono accent-sky">{value.toFixed(2)}</span>
            </div>
            <input
              type="range" min="0" max="1" step="0.05"
              value={value} onChange={(e) => onChange(parseFloat(e.target.value))}
              className="w-full"
            />
          </div>
        );
      }

      function AgentProgressBar({ loading }) {
        const stages = [
          { icon: "🌐", label: "Searching" }, { icon: "📦", label: "Retrieving" },
          { icon: "💬", label: "Analyzing" }, { icon: "💰", label: "Pricing" },
          { icon: "⚖️", label: "Scoring" }, { icon: "🎯", label: "Selecting" },
          { icon: "🧾", label: "Explaining" },
        ];
        const [activeStage, setActiveStage] = useState(0);

        useEffect(() => {
          if (!loading) { setActiveStage(0); return; }
          const timers = stages.map((_, i) => setTimeout(() => setActiveStage(i), i * 1200));
          return () => timers.forEach(clearTimeout);
        }, [loading]);

        if (!loading) return null;

        return (
          <div className="bg-secondary border border-custom rounded-2xl p-5 fade-in">
            <div className="flex items-center gap-2 mb-4">
              <div className="w-2 h-2 rounded-full bg-accent-sky pulse-dot"></div>
              <span className="text-xs uppercase tracking-widest accent-sky font-semibold">Agent Pipeline Active</span>
            </div>
            <div className="grid grid-cols-7 gap-2">
              {stages.map((stage, i) => (
                <div key={i} className={`flex flex-col items-center text-center gap-1.5 p-2 rounded-xl transition-all duration-500
                  ${i < activeStage ? "opacity-40" : ""}
                  ${i === activeStage ? "bg-sky-500/10 border border-sky-500/30 shimmer" : ""}
                  ${i > activeStage ? "opacity-20" : ""}`}>
                  <span className="text-xl">{stage.icon}</span>
                  <span className="text-[10px] text-secondary leading-tight">{stage.label}</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function SkeletonCard() {
        return (
          <div className="bg-secondary border border-custom rounded-2xl p-4 animate-pulse">
            <div className="h-4 bg-tertiary rounded w-3/4 mb-3"></div>
            <div className="h-3 bg-tertiary rounded w-1/2 mb-4"></div>
            <div className="flex justify-between">
              <div className="h-6 bg-tertiary rounded w-20"></div>
              <div className="h-6 bg-tertiary rounded w-12"></div>
            </div>
          </div>
        );
      }

      function SkeletonTable() {
        return (
          <div className="bg-secondary border border-custom rounded-2xl overflow-hidden">
            <div className="p-4 border-b border-custom">
              <div className="h-4 bg-tertiary rounded w-32 skeleton"></div>
            </div>
            {[1, 2, 3, 4, 5].map(i => (
              <div key={i} className="flex items-center gap-4 p-4 border-b border-custom/50 last:border-0">
                <div className="h-4 bg-tertiary rounded w-8 skeleton"></div>
                <div className="flex-1">
                  <div className="h-4 bg-tertiary rounded w-3/4 mb-2"></div>
                  <div className="h-3 bg-tertiary rounded w-1/2"></div>
                </div>
                <div className="h-4 bg-tertiary rounded w-16"></div>
                <div className="h-4 bg-tertiary rounded w-20"></div>
                <div className="h-4 bg-tertiary rounded w-12"></div>
              </div>
            ))}
          </div>
        );
      }

      function PriceChart({ product }) {
        const canvasRef = useRef(null);
        const chartRef = useRef(null);

        useEffect(() => {
          if (!product || !product.historical_price) return;
          const ctx = canvasRef.current.getContext("2d");
          if (chartRef.current) chartRef.current.destroy();
          chartRef.current = new Chart(ctx, {
            type: "line",
            data: {
              labels: product.historical_price.map((_, i) => `T-${product.historical_price.length - i}`),
              datasets: [{ label: "Price (₹)", data: product.historical_price, borderColor: "#38bdf8", backgroundColor: "rgba(56, 189, 248, 0.1)", tension: 0.4, fill: true, pointBackgroundColor: "#38bdf8", pointBorderColor: "#020617", pointBorderWidth: 2, pointRadius: 4 }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: "#e5e7eb", font: { family: "Inter" } } } },
              scales: { x: { ticks: { color: "#9ca3af" }, grid: { color: "rgba(148,163,184,0.08)" } },
                y: { ticks: { color: "#9ca3af", callback: (val) => "₹" + val.toLocaleString() }, grid: { color: "rgba(148,163,184,0.08)" } } }
          });
          return () => { if (chartRef.current) chartRef.current.destroy(); };
        }, [product]);

        if (!product) return null;

        return (
          <div className="bg-secondary border border-custom rounded-2xl p-4 h-full">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-sm">📈</span>
              <h3 className="text-sm font-semibold accent-sky">Price Trend</h3>
            </div>
            <p className="text-xs text-muted mb-2 line-clamp-1">{product.title}</p>
            <canvas ref={canvasRef} height="180"></canvas>
          </div>
        );
      }

      function ProductImage({ src, title, className }) {
        const [error, setError] = useState(false);
        
        if (error || !src || src === "#") {
          return (
            <div className={`bg-tertiary rounded-lg flex items-center justify-center ${className}`}>
              <span className="text-3xl">📦</span>
            </div>
          );
        }
        
        return (
          <img 
            src={src} 
            alt={title}
            className={`object-cover rounded-lg ${className}`}
            onError={() => setError(true)}
          />
        );
      }

      function TopPickCard({ emoji, title, item, accentColor, onAddToWishlist, onSetAlert }) {
        if (!item) return null;
        const borders = { gold: "border-amber-500/40 hover:border-amber-500/60", green: "border-emerald-500/40 hover:border-emerald-500/60", purple: "border-violet-500/40 hover:border-violet-500/60" };
        const gradients = { gold: "from-amber-500/10", green: "from-emerald-500/10", purple: "from-violet-500/10" };

        return (
          <div className={`bg-gradient-to-b ${gradients[accentColor]} bg-secondary border ${borders[accentColor]} rounded-2xl p-4 flex flex-col space-y-3 transition-all duration-300 fade-in hover:scale-[1.02]`}>
            <div className="flex gap-3">
              <ProductImage src={item.image_url} title={item.title} className="w-20 h-20 flex-shrink-0" />
              <div className="flex-1 min-w-0">
                <div className="flex items-start justify-between gap-2">
                  <div>
                    <div className="text-[10px] uppercase tracking-widest text-muted font-semibold">{title}</div>
                    <div className="font-semibold text-sm mt-0.5 line-clamp-2">{item.title}</div>
                  </div>
                  <CircularScore score={item.smart_score} size={48} strokeWidth={4} />
                </div>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <span className={`platform-badge ${getPlatformClass(item.platform)}`}>{item.platform}</span>
              <button onClick={() => onAddToWishlist(item)} className="text-rose-400 hover:text-rose-300 text-sm transition">♡</button>
              <button onClick={() => onSetAlert(item)} className="text-amber-400 hover:text-amber-300 text-sm transition">🔔</button>
              {item.product_url && item.product_url !== "#" && (
                <a href={item.product_url} target="_blank" rel="noopener noreferrer" className="ml-auto text-[10px] accent-sky hover:text-sky-300 underline underline-offset-2">View →</a>
              )}
            </div>
            {item.why_selected && (
              <div className="space-y-1.5">
                {item.why_selected.slice(0, 2).map((reason, idx) => (
                  <div key={idx} className="text-xs text-secondary flex items-start">
                    <span className="mr-1.5 accent-sky">✓</span>
                    <span className="line-clamp-1">{reason}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="flex justify-between text-xs text-muted pt-1 border-t border-custom/50">
              <span className="font-semibold text-primary">₹{item.price.toLocaleString()}</span>
              <span className="text-muted line-through">₹{item.original_price?.toLocaleString()}</span>
              <span>⭐ {item.seller_rating}</span>
              <span>🚚 {item.delivery_days}d</span>
            </div>
          </div>
        );
      }

      function PlatformBadge({ platform }) {
        return <span className={`platform-badge ${getPlatformClass(platform)}`}>{platform}</span>;
      }

      function EmptyState({ icon, title, message }) {
        return (
          <div className="flex flex-col items-center justify-center py-16 px-4 text-center">
            <span className="text-5xl mb-4">{icon}</span>
            <h3 className="text-lg font-semibold text-primary mb-2">{title}</h3>
            <p className="text-sm text-muted max-w-md">{message}</p>
          </div>
        );
      }

      function AutocompleteDropdown({ query, onSelect }) {
        const suggestions = useMemo(() => {
          if (!query || query.length < 2) return [];
          const q = query.toLowerCase();
          return AUTOCOMPLETE_SUGGESTIONS.filter(s => s.toLowerCase().includes(q)).slice(0, 5);
        }, [query]);

        if (suggestions.length === 0) return null;

        return (
          <div className="absolute top-full left-0 right-0 mt-1 bg-secondary border border-custom rounded-xl shadow-xl z-40 overflow-hidden fade-in">
            {suggestions.map((suggestion, i) => (
              <button key={i} onClick={() => onSelect(suggestion)}
                className="w-full text-left px-4 py-2.5 text-sm hover:bg-tertiary transition flex items-center gap-2">
                <span className="text-muted">🔍</span>
                <span>{suggestion}</span>
              </button>
            ))}
          </div>
        );
      }

      function SortableHeader({ label, field, sortField, sortDirection, onSort }) {
        const isActive = sortField === field;
        return (
          <th className="px-3 py-2.5 text-right cursor-pointer hover:bg-tertiary/50 transition select-none"
            onClick={() => onSort(field)}>
            <span className="flex items-center justify-end gap-1">
              <span>{label}</span>
              <span className={`sort-icon ${isActive && sortDirection === 'asc' ? 'text-accent-sky' : ''}`}>
                {isActive ? (sortDirection === 'asc' ? '↑' : '↓') : '↕'}
              </span>
            </span>
          </th>
        );
      }

      function ComparisonTable({ products, selectedId, onSelect, onSetAlert, sortField, onSort }) {
        const sortDirection = sortField.startsWith('-') ? 'desc' : 'asc';
        const actualField = sortField.replace('-', '');
        
        const sortedProducts = useMemo(() => {
          if (!products) return [];
          const sorted = [...products].sort((a, b) => {
            let aVal, bVal;
            switch (actualField) {
              case 'price': aVal = a.price; bVal = b.price; break;
              case 'rating': aVal = a.seller_rating; bVal = b.seller_rating; break;
              case 'score': aVal = a.smart_score; bVal = b.smart_score; break;
              case 'delivery': aVal = a.delivery_days; bVal = b.delivery_days; break;
              default: return 0;
            }
            return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;

          return sorted;

      function App() {
        const [darkMode, setDarkMode] = useLocalStorage("buywise-dark-mode", true);
        const [activeView, setActiveView] = useState("home");
        const [query, setQuery] = useState("");
        const [weights, setWeights] = useLocalStorage("buywise-weights", { price: 0.3, reviews: 0.3, rating: 0.2, delivery: 0.2 });
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [data, setData] = useState(null);
        const [selectedProductId, setSelectedProductId] = useState(null);
        const [showDetailModal, setShowDetailModal] = useState(false);
        const [showAlertModal, setShowAlertModal] = useState(null);
        const [wishlist, setWishlist] = useLocalStorage("buywise-wishlist", []);
        const [alerts, setAlerts] = useLocalStorage("buywise-alerts", []);
        const [searchHistory, setSearchHistory] = useLocalStorage("buywise-history", []);
        const [toast, setToast] = useState(null);
        const [showFilters, setShowFilters] = useState(false);
        const [showAutocomplete, setShowAutocomplete] = useState(false);
        const [sortField, setSortField] = useState("-score");
        const [filters, setFilters] = useState({
          category: "all", minPrice: "", maxPrice: "", platforms: [], brands: [], inStockOnly: false
        });
        const searchInputRef = useRef(null);

        useEffect(() => {
          document.documentElement.classList.toggle("light-mode", !darkMode);
        }, [darkMode]);

        const showToast = useCallback((message, type) => {
          setToast({ message, type });
        }, []);

        const handleSort = (field) => {
          if (sortField === field) {
            setSortField(field.startsWith('-') ? field.slice(1) : `-${field}`);
          } else {
            setSortField(field);
          }
        };

        const handleSearch = async (e) => {
          if (e) e.preventDefault();
          if (!query.trim()) return;
          setLoading(true);
          setError(null);
          setData(null);
          setShowAutocomplete(false);

          setSearchHistory(prev => [{
            query, date: new Date().toLocaleDateString(), results: 6
          }, ...prev.filter(h => h.query !== query).slice(0, 9)]);

          try {
            const res = await fetch("/api/recommendations", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ query, weights })
            });
            if (!res.ok) throw new Error("Request failed");
            const json = await res.json();
            setData(json);
            if (json.products?.length) setSelectedProductId(json.products[0].id);
          } catch (err) {
            console.error(err);
            setError("Something went wrong. Please try again.");
            showToast("Search failed. Please try again.", "error");
          } finally {
            setLoading(false);
          }
        };

        const addToWishlist = (item) => {
          if (!wishlist.find(w => w.id === item.id)) {
            setWishlist(prev => [...prev, item]);
            showToast("Added to wishlist!", "success");
          } else {
            showToast("Already in wishlist", "info");
          }
        };

        const removeFromWishlist = (index) => {
          setWishlist(prev => prev.filter((_, i) => i !== index));
          showToast("Removed from wishlist", "info");
        };

        const createAlert = (product, targetPrice) => {
          setAlerts(prev => [...prev, { 
            ...product, 
            targetPrice, 
            currentPrice: product.price, 
            status: "Active",
            createdAt: new Date().toISOString()
          }]);
          setShowAlertModal(null);
          showToast("Price alert set!", "success");
        };

        const removeAlert = (index) => {
          setAlerts(prev => prev.filter((_, i) => i !== index));
        };

        const clearHistory = () => setSearchHistory([]);
        const rerunSearch = (q) => { setQuery(q); setActiveView("home"); setTimeout(() => handleSearch(), 100); };
        const applyPreset = (presetWeights) => { setWeights(presetWeights); showToast("Preset applied!", "success"); };

        const selectedProduct = data?.products?.find(p => p.id === selectedProductId) || null;
        const platforms = data?.products ? [...new Set(data.products.map(p => p.platform))] : [];
        const brands = data?.products ? [...new Set(data.products.map(p => p.brand).filter(Boolean))] : [];

        return (
          <div className="flex min-h-screen">
            <Sidebar 
              activeView={activeView} 
              setActiveView={setActiveView}
              wishlistCount={wishlist.length}
              onThemeToggle={() => setDarkMode(!darkMode)}
              darkMode={darkMode}
            />

            <main className="flex-1 p-6 overflow-y-auto">
              {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
              {showDetailModal && selectedProduct && (
                <ProductDetailPanel 
                  product={selectedProduct} 
                  onClose={() => setShowDetailModal(false)}
                  onAddToWishlist={addToWishlist}
                  onSetAlert={(p) => { setShowDetailModal(false); setShowAlertModal(p); }}
                />
              )}
              {showAlertModal && (
                <AlertModal 
                  product={showAlertModal} 
                  onClose={() => setShowAlertModal(null)}
                  onCreate={(targetPrice) => createAlert(showAlertModal, targetPrice)}
                />
              )}

              {activeView === "home" && (
                <div className="max-w-5xl mx-auto space-y-6 fade-in">
                  <header className="text-center py-6">
                    <h1 className={`text-4xl md:text-5xl font-bold tracking-tight bg-gradient-to-r ${darkMode ? "from-sky-300 via-blue-400 to-violet-400" : "from-sky-600 via-blue-700 to-violet-600"} bg-clip-text text-transparent`}>
                      BuyWise
                    </h1>
                    <p className="text-sm text-muted mt-2">Find your perfect product with AI-powered recommendations</p>
                  </header>

                  <form onSubmit={handleSearch} className="bg-secondary border border-custom rounded-2xl p-5 space-y-4">
                    <div className="relative">
                      <div className="flex flex-col sm:flex-row gap-3">
                        <div className="flex-1 relative">
                          <span className="absolute left-4 top-1/2 -translate-y-1/2 text-muted">🔍</span>
                          <input ref={searchInputRef} type="text" value={query} 
                            onChange={(e) => { setQuery(e.target.value); setShowAutocomplete(true); }}
                            onFocus={() => setShowAutocomplete(true)}
                            placeholder="What are you looking for? (e.g. laptop under 50k)"
                            className="w-full pl-11 pr-4 py-3 bg-tertiary border border-custom rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 placeholder:text-muted" />
                          {query && (
                            <button type="button" onClick={() => setQuery("")} className="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-primary">✕</button>
                          )}
                          <button type="button" className="absolute right-12 top-1/2 -translate-y-1/2 text-muted hover:text-primary">🎤</button>
                        </div>
                        <button type="button" onClick={() => setShowFilters(!showFilters)}
                          className={`px-4 py-2 rounded-xl border text-sm transition ${showFilters ? "bg-sky-500/20 border-sky-500/50 accent-sky" : "bg-tertiary border-custom text-secondary hover:border-sky-500/30"}`}>
                          Filters
                        </button>
                        <button type="submit" disabled={loading || !query.trim()}
                          className="px-6 py-2.5 bg-gradient-to-r from-sky-500 to-blue-600 rounded-xl text-sm font-semibold hover:from-sky-400 hover:to-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-sky-500/20">
                          {loading ? <span className="flex items-center gap-2"><svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Searching...</span> : "Search"}
                        </button>
                      </div>
                      {showAutocomplete && <AutocompleteDropdown query={query} onSelect={(s) => { setQuery(s); setShowAutocomplete(false); }} />}
                    </div>

                    {showFilters && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-3 border-t border-custom fade-in">
                        <div>
                          <label className="text-xs text-muted uppercase tracking-wide mb-1 block">Category</label>
                          <select value={filters.category} onChange={(e) => setFilters(f => ({ ...f, category: e.target.value }))}
                            className="w-full px-3 py-2 bg-tertiary border border-custom rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
                            {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="text-xs text-muted uppercase tracking-wide mb-1 block">Platform</label>
                          <div className="flex flex-wrap gap-2">
                            {PLATFORMS.map(p => (
                              <button key={p} type="button" onClick={() => setFilters(f => ({
                                ...f, platforms: f.platforms.includes(p) ? f.platforms.filter(x => x !== p) : [...f.platforms, p]
                              }))}
                                className={`px-3 py-1 rounded-lg text-xs border transition ${filters.platforms.includes(p) ? "bg-sky-500/20 border-sky-500/50 accent-sky" : "bg-tertiary border-custom text-muted hover:border-sky-500/30"}`}>
                                {p}
                              </button>
                            ))}
                          </div>
                        </div>
                        {brands.length > 0 && (
                          <div className="md:col-span-2">
                            <label className="text-xs text-muted uppercase tracking-wide mb-1 block">Brand</label>
                            <div className="flex flex-wrap gap-2">
                              {brands.slice(0, 10).map(b => (
                                <button key={b} type="button" onClick={() => setFilters(f => ({
                                  ...f, brands: f.brands.includes(b) ? f.brands.filter(x => x !== b) : [...f.brands, b]
                                }))}
                                  className={`px-3 py-1 rounded-lg text-xs border transition ${filters.brands.includes(b) ? "bg-violet-500/20 border-violet-500/50 text-violet-400" : "bg-tertiary border-custom text-muted hover:border-violet-500/30"}`}>
                                  {b}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                        <div className="flex gap-3">
                          <div className="flex-1">
                            <label className="text-xs text-muted uppercase tracking-wide mb-1 block">Min Price (₹)</label>
                            <input type="number" value={filters.minPrice} onChange={(e) => setFilters(f => ({ ...f, minPrice: e.target.value }))}
                              placeholder="0" className="w-full px-3 py-2 bg-tertiary border border-custom rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                          </div>
                          <div className="flex-1">
                            <label className="text-xs text-muted uppercase tracking-wide mb-1 block">Max Price (₹)</label>
                            <input type="number" value={filters.maxPrice} onChange={(e) => setFilters(f => ({ ...f, maxPrice: e.target.value }))}
                              placeholder="100000" className="w-full px-3 py-2 bg-tertiary border border-custom rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                          </div>
                        </div>
                        <div className="flex items-center gap-3">
                          <label className="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" checked={filters.inStockOnly} onChange={(e) => setFilters(f => ({ ...f, inStockOnly: e.target.checked }))}
                              className="w-4 h-4 rounded accent-sky" />
                            <span className="text-sm">In Stock Only</span>
                          </label>
                        </div>
                      </div>
                    )}

                    <div className="border-t border-custom pt-4">
                      <h4 className="text-xs text-muted uppercase tracking-wide mb-3">Preference Weights</h4>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <WeightSlider label="Price" icon="💰" value={weights.price} onChange={(v) => setWeights(w => ({...w, price: v}))} />
                        <WeightSlider label="Reviews" icon="💬" value={weights.reviews} onChange={(v) => setWeights(w => ({...w, reviews: v}))} />
                        <WeightSlider label="Rating" icon="⭐" value={weights.rating} onChange={(v) => setWeights(w => ({...w, rating: v}))} />
                        <WeightSlider label="Delivery" icon="🚚" value={weights.delivery} onChange={(v) => setWeights(w => ({...w, delivery: v}))} />
                      </div>
                    </div>
                  </form>

                  <AgentProgressBar loading={loading} />

                  {error && (
                    <div className="bg-rose-900/40 border border-rose-700/70 text-rose-100 text-sm rounded-xl px-4 py-3 flex items-center gap-2">
                      <span>⚠️</span> {error}
                    </div>
                  )}

                  {loading && !data && (
                    <div className="space-y-4">
                      <div className="grid md:grid-cols-3 gap-4">
                        {[1, 2, 3].map(i => <SkeletonCard key={i} />)}
                      </div>
                      <SkeletonTable />
                    </div>
                  )}

                  {data && (
                    <section className="space-y-5 fade-in">
                      {platforms.length > 0 && (
                        <div className="flex items-center gap-3 flex-wrap">
                          <span className="text-[11px] uppercase tracking-widest text-muted font-semibold">Sources:</span>
                          {platforms.map(p => <PlatformBadge key={p} platform={p} />)}
                          <span className="text-[11px] text-muted ml-2">• {data.products?.length || 0} products</span>
                          <span className="text-[11px] text-muted">• Found in {data.executionTime || '~'}ms</span>
                        </div>
                      )}

                      <div className="grid md:grid-cols-3 gap-4">
                        <TopPickCard emoji="🥇" title="Best Overall" item={data.topPicks?.best_overall} accentColor="gold" onAddToWishlist={addToWishlist} onSetAlert={(p) => setShowAlertModal(p)} />
                        <TopPickCard emoji="💰" title="Best Budget" item={data.topPicks?.best_budget} accentColor="green" onAddToWishlist={addToWishlist} onSetAlert={(p) => setShowAlertModal(p)} />
                        <TopPickCard emoji="⭐" title="Premium Pick" item={data.topPicks?.premium_pick} accentColor="purple" onAddToWishlist={addToWishlist} onSetAlert={(p) => setShowAlertModal(p)} />
                      </div>

                      <div className="grid md:grid-cols-3 gap-4">
                        <div className="md:col-span-2">
                          <ComparisonTable 
                            products={data.products} 
                            selectedId={selectedProductId} 
                            onSelect={(id) => { setSelectedProductId(id); setShowDetailModal(true); }}
                            onSetAlert={(p) => setShowAlertModal(p)}
                            sortField={sortField}
                            onSort={handleSort}
                          />
                        </div>
                        <PriceChart product={selectedProduct} />
                      </div>

                      {data.explanation?.reasoning && (
                        <div className="bg-secondary border border-custom rounded-2xl p-5 fade-in">
                          <h3 className="text-sm font-semibold mb-3 text-primary flex items-center gap-2">🧾 Why these recommendations?</h3>
                          <ul className="space-y-2.5">
                            {data.explanation.reasoning.map((reason, idx) => (
                              <li key={idx} className="text-xs text-secondary flex items-start">
                                <span className="mr-2 accent-sky mt-0.5">▸</span>
                                <span>{reason}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </section>
                  )}

                  {!data && !loading && (
                    <EmptyState icon="🔍" title="Start searching" message="Enter a product query above to get AI-powered recommendations from multiple e-commerce platforms." />
                  )}
                </div>
              )}

              {activeView === "wishlist" && (
                <div className="max-w-5xl mx-auto fade-in">
                  <h2 className="text-2xl font-bold mb-6">❤️ Wishlist</h2>
                  <WishlistView wishlist={wishlist} onRemove={removeFromWishlist} />
                </div>
              )}

              {activeView === "alerts" && (
                <div className="max-w-3xl mx-auto fade-in">
                  <h2 className="text-2xl font-bold mb-6">🔔 Price Alerts</h2>
                  <AlertsView alerts={alerts} onRemove={removeAlert} />
                </div>
              )}

              {activeView === "history" && (
                <div className="max-w-3xl mx-auto fade-in">
                  <h2 className="text-2xl font-bold mb-6">🕐 Search History</h2>
                  <HistoryView history={searchHistory} onRerun={rerunSearch} onClear={clearHistory} />
                </div>
              )}

              {activeView === "settings" && (
                <div className="fade-in">
                  <h2 className="text-2xl font-bold mb-6">⚙️ Settings</h2>
                  <SettingsView weights={weights} setWeights={setWeights} onPreset={applyPreset} />
                </div>
              )}

              <footer className="text-center py-8 mt-12 border-t border-custom">
                <p className="text-[11px] text-muted">BuyWise • Multi-Agent AI Buying Assistant • Powered by 7 specialized agents</p>
              </footer>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
